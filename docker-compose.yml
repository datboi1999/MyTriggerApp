version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/trigger
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    depends_on:
      - mongo
    volumes:
      - ./backend/src:/app/src
    networks:
      - trigger-network
    command: npm run dev

  mongo:
    image: mongo:6
    container_name: trigger-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: trigger
    volumes:
      - mongo-data:/data/db
    networks:
      - trigger-network

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/trigger
    depends_on:
      - mongo
    networks:
      - trigger-network

volumes:
  mongo-data:

networks:
  trigger-network:
    driver: bridge
