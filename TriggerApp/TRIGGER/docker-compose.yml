version: '3.8'

services:
  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - backend

  # Backend (NestJS/Fastify)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka

  # AI Agents (Python)
  humanizer:
    build:
      context: .
      dockerfile: apps/ai-agents/humanizer/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - AGENT_NAME=Humanizer

  optimizer:
    build:
      context: .
      dockerfile: apps/ai-agents/optimizer/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - AGENT_NAME=Optimizer

  stabilizer:
    build:
      context: .
      dockerfile: apps/ai-agents/stabilizer/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - AGENT_NAME=Stabilizer

  economist:
    build:
      context: .
      dockerfile: apps/ai-agents/economist/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - AGENT_NAME=Economist

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=trigger
      - POSTGRES_PASSWORD=trigger_password
      - POSTGRES_DB=trigger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Kafka (Message Queue)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

volumes:
  postgres_data:
  redis_data:
